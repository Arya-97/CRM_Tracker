<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Login - Working Version</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            display: none;
        }
        .success {
            background: #efe;
            color: #0a0;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 CRM System</h2>
        <p>Sign in with your Google account</p>
        
        <!-- Google button will appear here -->
        <div id="google-btn"></div>
        
        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>
    </div>

    <!-- Load Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        // ⚠️ IMPORTANT: REPLACE THIS WITH YOUR ACTUAL CLIENT ID
        // Get it from: https://console.cloud.google.com/apis/credentials
        const YOUR_CLIENT_ID = '441324421260-qpvoha7vmbo2tmp4f7ofkj844nlrj0ir.apps.googleusercontent.com';
        
        // This is a DEMO Client ID - works for testing
        // For production, replace with your own Client ID
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        // Check if Google library loaded
        if (typeof google === 'undefined') {
            showError('Google library failed to load. Check your internet connection.');
        } else {
            console.log('Google library loaded successfully');
            
            // Initialize Google Login
            google.accounts.id.initialize({
                client_id: YOUR_CLIENT_ID,
                callback: (response) => {
                    console.log('Login response:', response);
                    
                    if (response.credential) {
                        // Decode the JWT token to get user info
                        const payload = JSON.parse(atob(response.credential.split('.')[1]));
                        console.log('User info:', payload);
                        
                        showSuccess(`✅ Welcome ${payload.name}! (${payload.email})`);
                        
                        // You can now load your full CRM
                        setTimeout(() => {
                            document.body.innerHTML = `
                                <div style="text-align: center; padding: 50px;">
                                    <h1>✅ Login Successful!</h1>
                                    <p>Name: ${payload.name}</p>
                                    <p>Email: ${payload.email}</p>
                                    <button onclick="location.reload()">Logout</button>
                                    <br><br>
                                    <p>Now replace this with your full CRM code.</p>
                                </div>
                            `;
                        }, 1500);
                    }
                },
                auto_select: false
            });
            
            // Render the button
            google.accounts.id.renderButton(
                document.getElementById('google-btn'),
                { 
                    theme: 'outline', 
                    size: 'large',
                    width: 300,
                    text: 'signin_with',
                    shape: 'rectangular'
                }
            );
            
            // Also show prompt
            google.accounts.id.prompt();
        }
        
        // Check if button is rendered
        setTimeout(() => {
            const btn = document.querySelector('#google-btn iframe');
            if (!btn) {
                showError('Login button not rendered. Check Client ID and internet connection.');
            } else {
                console.log('Login button rendered successfully');
            }
        }, 2000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .google-btn {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
        }
        
        .google-btn:hover {
            background: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }
        
        .google-icon {
            width: 20px;
            height: 20px;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            display: none;
        }
        
        .info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .manual-login {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .manual-login h4 {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 CRM System</h2>
        <div class="subtitle">Sign in with your Google account</div>
        
        <!-- Manual Email Input (Fallback) -->
        <div class="manual-login">
            <h4>👥 Authorized Agents Only</h4>
            <input type="email" id="agent-email" placeholder="Enter your email address">
            <button class="google-btn" onclick="manualLogin()" style="background: #4CAF50; color: white; border: none; margin-top: 10px;">
                Continue with Email
            </button>
        </div>
        
        <div id="error-message" class="error"></div>
        <div class="info">
            ℹ️ Authorized agents can login. Contact admin to add your email.
        </div>
    </div>

    <script>
        // Your Google Sheet ID (configure this)
        const SPREADSHEET_ID = '1KZxUavEe9n-V4AdMZopaWiDGqwo1V260tK_XwcVzxpU'; // CHANGE THIS
        
        // Authorized users (you can also load from Google Sheet)
        // Add your email here for testing
        const AUTHORIZED_USERS = {
            'vishwaradya.1@pw.live': 'admin',
            'agent1@gmail.com': 'agent',
            'agent2@gmail.com': 'agent'
        };
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function manualLogin() {
            const email = document.getElementById('agent-email').value.trim().toLowerCase();
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }
            
            // Check if email is authorized
            const role = AUTHORIZED_USERS[email];
            
            if (!role) {
                showError(`❌ Access Denied: ${email} is not authorized. Contact admin to add your email.`);
                return;
            }
            
            // Login successful
            const userName = email.split('@')[0];
            loginSuccess(email, userName, role);
        }
        
        function loginSuccess(email, name, role) {
            // Store user info
            const user = {
                email: email,
                name: name,
                role: role,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('crm_user', JSON.stringify(user));
            
            // Show success and redirect to main app
            document.body.innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 500px; margin: 50px auto;">
                    <h2>✅ Login Successful!</h2>
                    <p>Welcome, ${name}!</p>
                    <p>Role: ${role.toUpperCase()}</p>
                    <button onclick="loadMainApp()" style="background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin-top: 20px;">
                        Launch CRM Dashboard →
                    </button>
                </div>
            `;
        }
        
        function loadMainApp() {
            const user = JSON.parse(localStorage.getItem('crm_user'));
            
            if (!user) {
                location.reload();
                return;
            }
            
            // Load the full CRM interface
            document.body.innerHTML = `
                <div style="padding: 20px;">
                    <div style="background: #1a1f3a; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>📊 CRM System</strong> | ${user.name} (${user.role})
                        </div>
                        <button onclick="logout()" style="background: #f44336; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Logout</button>
                    </div>
                    
                    <div style="background: white; padding: 20px; border-radius: 10px;">
                        <h3>Welcome to CRM Dashboard</h3>
                        <p>Your data will load from Google Sheets here.</p>
                        <div id="data-container" style="margin-top: 20px;">
                            <p>Loading data from Google Sheet...</p>
                        </div>
                    </div>
                </div>
            `;
            
            loadSheetData();
        }
        
        async function loadSheetData() {
            const container = document.getElementById('data-container');
            
            if (!SPREADSHEET_ID || SPREADSHEET_ID === 'YOUR_SHEET_ID_HERE') {
                container.innerHTML = `
                    <div style="background: #fff3cd; padding: 15px; border-radius: 8px;">
                        <p>⚠️ Please configure your Sheet ID in the code.</p>
                        <p>Find this line in the HTML: <code>const SPREADSHEET_ID = 'YOUR_SHEET_ID_HERE';</code></p>
                        <p>Replace with your Google Sheet ID from the URL.</p>
                    </div>
                `;
                return;
            }
            
            try {
                // Using Google Sheets API (simplified)
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Main%20Tracker!A1:M20`, {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const rows = data.values || [];
                    
                    if (rows.length > 0) {
                        const headers = rows[0];
                        const records = rows.slice(1);
                        
                        container.innerHTML = `
                            <div style="overflow-x: auto;">
                                <table style="width: 100%; border-collapse: collapse;">
                                    <thead>
                                        <tr style="background: #f0f0f0;">
                                            ${headers.map(h => `<th style="padding: 10px; border: 1px solid #ddd; text-align: left;">${h}</th>`).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${records.map(row => `
                                            <tr>
                                                ${row.map(cell => `<td style="padding: 10px; border: 1px solid #ddd;">${cell || '-'}</td>`).join('')}
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                                <p style="margin-top: 10px; color: #666;">Showing ${records.length} of ${records.length} records</p>
                            </div>
                        `;
                    } else {
                        container.innerHTML = '<p>No data found in sheet.</p>';
                    }
                } else {
                    throw new Error('Failed to load sheet');
                }
            } catch (error) {
                container.innerHTML = `
                    <div style="background: #fee; padding: 15px; border-radius: 8px;">
                        <p>❌ Error loading sheet: ${error.message}</p>
                        <p>Make sure your sheet is shared publicly or with "Anyone with link can view".</p>
                    </div>
                `;
            }
        }
        
        function logout() {
            localStorage.removeItem('crm_user');
            location.reload();
        }
        
        // Check if already logged in
        const savedUser = localStorage.getItem('crm_user');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            // Check if session is still valid (less than 24 hours)
            const loginTime = new Date(user.loginTime);
            const now = new Date();
            const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
            
            if (hoursDiff < 24) {
                loadMainApp();
            } else {
                localStorage.removeItem('crm_user');
            }
        }
    </script>
</body>
</html>
